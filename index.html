<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Integrales</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #0ea5e9;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
      min-height: 40px;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Calculadora de Integrales</h1>

    <label>Función f(x):</label>
    <input type="text" id="func" placeholder="Ej: sin(x), x^2, exp(x)" />

    <label>Límite inferior (a) — opcional:</label>
    <input type="number" id="a" placeholder="Ej: 0" />

    <label>Límite superior (b) — opcional:</label>
    <input type="number" id="b" placeholder="Ej: 5" />

    <label>Decimales del resultado:</label>
    <input type="number" id="decimales" value="4" min="0" max="10" />

    <button onclick="calcularIntegral()">Calcular Integral</button>

    <div class="result" id="resultado">Resultado: —</div>
    <div class="note">
      Si dejas a y b vacíos, la calculadora no puede resolver integrales indefinidas (solo definidas).
    </div>
  </div>

  <script>
    function simpson(f, a, b, n = 1000) {
      if (n % 2 !== 0) n++;
      const h = (b - a) / n;
      let sum = f(a) + f(b);

      for (let i = 1; i < n; i++) {
        const x = a + i * h;
        sum += (i % 2 === 0 ? 2 : 4) * f(x);
      }

      return (h / 3) * sum;
    }

    function calcularIntegral() {
      const funcStr = document.getElementById("func").value;
      const aInput = document.getElementById("a").value;
      const bInput = document.getElementById("b").value;
      const decimalesInput = document.getElementById("decimales").value;
      const resultadoDiv = document.getElementById("resultado");

      const decimales = parseInt(decimalesInput) || 4;

      if (!funcStr) {
        resultadoDiv.textContent = "Resultado: Ingresa una función válida";
        return;
      }

      // Si no hay límites, no es integral definida
      if (aInput === "" || bInput === "") {
        resultadoDiv.textContent = "Resultado: Esta calculadora solo resuelve integrales definidas (con límites a y b)";
        return;
      }

      const a = parseFloat(aInput);
      const b = parseFloat(bInput);

      if (isNaN(a) || isNaN(b)) {
        resultadoDiv.textContent = "Resultado: Límites no válidos";
        return;
      }

      try {
        const expr = math.compile(funcStr);
        const f = (x) => expr.evaluate({ x });
        const resultado = simpson(f, a, b);

        resultadoDiv.textContent = `Resultado: ∫[${a}, ${b}] = ${resultado.toFixed(decimales)}`;
      } catch (error) {
        resultadoDiv.textContent = "Error: Función no válida";
      }
    }
  </script>
</body>
</html>
