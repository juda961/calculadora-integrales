<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Integrales</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
  <!-- Librería para integrales indefinidas (simbólicas) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nerdamer/1.1.13/nerdamer.core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nerdamer/1.1.13/Calculus.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      width: 460px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    .symbol-box {
      margin-top: 10px;
      background: #020617;
      padding: 10px;
      border-radius: 10px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }

    .symbol-btn {
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    .symbol-btn:hover {
      background: #0ea5e9;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: #22c55e;
      color: #020617;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
      min-height: 40px;
      word-break: break-word;
    }

    .hidden {
      display: none;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Calculadora de Integrales</h1>

    <label>Tipo de integral:</label>
    <select id="tipo" onchange="cambiarTipo()">
      <option value="definida">Integral Definida</option>
      <option value="indefinida">Integral Indefinida</option>
    </select>

    <label>Función f(x):</label>
    <input type="text" id="func" placeholder="Ej: sin(x) + x^2" />

    <div class="symbol-box">
      <button class="symbol-btn" onclick="insertar('x')">x</button>
      <button class="symbol-btn" onclick="insertar('^')">^</button>
      <button class="symbol-btn" onclick="insertar('sqrt()')">√</button>
      <button class="symbol-btn" onclick="insertar('sin()')">sin</button>
      <button class="symbol-btn" onclick="insertar('cos()')">cos</button>
      <button class="symbol-btn" onclick="insertar('tan()')">tan</button>
      <button class="symbol-btn" onclick="insertar('log()')">log</button>
      <button class="symbol-btn" onclick="insertar('exp()')">exp</button>
      <button class="symbol-btn" onclick="insertar('pi')">π</button>
      <button class="symbol-btn" onclick="insertar('(')">(</button>
      <button class="symbol-btn" onclick="insertar(')')">)</button>
      <button class="symbol-btn" onclick="insertar('+')">+</button>
      <button class="symbol-btn" onclick="insertar('-')">−</button>
      <button class="symbol-btn" onclick="insertar('*')">×</button>
      <button class="symbol-btn" onclick="insertar('/')">÷</button>
      <button class="symbol-btn" onclick="insertar('^2')">x²</button>
      <button class="symbol-btn" onclick="insertar('^3')">x³</button>
      <button class="symbol-btn" onclick="borrar()">⌫</button>
    </div>

    <div id="limites">
      <label>Límite inferior (a):</label>
      <input type="number" id="a" placeholder="Ej: 0" />

      <label>Límite superior (b):</label>
      <input type="number" id="b" placeholder="Ej: 5" />
    </div>

    <label>Decimales (solo definida):</label>
    <input type="number" id="decimales" value="4" min="0" max="10" />

    <button onclick="calcularIntegral()">Calcular Integral</button>

    <div class="result" id="resultado">Resultado: —</div>
    <div class="note">Incluye símbolos matemáticos para escribir funciones fácilmente</div>
  </div>

  <script>
    function insertar(texto) {
      const input = document.getElementById("func");
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const valor = input.value;

      input.value = valor.substring(0, start) + texto + valor.substring(end);
      input.focus();
      input.selectionStart = input.selectionEnd = start + texto.length;
    }

    function borrar() {
      const input = document.getElementById("func");
      input.value = input.value.slice(0, -1);
      input.focus();
    }

    function cambiarTipo() {
      const tipo = document.getElementById("tipo").value;
      const limites = document.getElementById("limites");

      if (tipo === "definida") {
        limites.classList.remove("hidden");
      } else {
        limites.classList.add("hidden");
      }
    }

    function simpson(f, a, b, n = 1000) {
      if (n % 2 !== 0) n++;
      const h = (b - a) / n;
      let sum = f(a) + f(b);

      for (let i = 1; i < n; i++) {
        const x = a + i * h;
        sum += (i % 2 === 0 ? 2 : 4) * f(x);
      }

      return (h / 3) * sum;
    }

    function calcularIntegral() {
      const tipo = document.getElementById("tipo").value;
      const funcStr = document.getElementById("func").value;
      const resultadoDiv = document.getElementById("resultado");

      if (!funcStr) {
        resultadoDiv.textContent = "Resultado: Ingresa una función válida";
        return;
      }

      if (tipo === "indefinida") {
        try {
          const integral = nerdamer.integrate(funcStr, 'x').toString();
          resultadoDiv.textContent = `Resultado: ∫ f(x) dx = ${integral} + C`;
        } catch (error) {
          resultadoDiv.textContent = "Error: No se pudo calcular la integral indefinida";
        }
        return;
      }

      const aInput = document.getElementById("a").value;
      const bInput = document.getElementById("b").value;
      const decimales = parseInt(document.getElementById("decimales").value) || 4;

      if (aInput === "" || bInput === "") {
        resultadoDiv.textContent = "Resultado: Ingresa los límites a y b";
        return;
      }

      const a = parseFloat(aInput);
      const b = parseFloat(bInput);

      if (isNaN(a) || isNaN(b)) {
        resultadoDiv.textContent = "Resultado: Límites no válidos";
        return;
      }

      try {
        const expr = math.compile(funcStr);
        const f = (x) => expr.evaluate({ x });
        const resultado = simpson(f, a, b);

        resultadoDiv.textContent = `Resultado: ∫[${a}, ${b}] = ${resultado.toFixed(decimales)}`;
      } catch (error) {
        resultadoDiv.textContent = "Error: Función no válida";
      }
    }
  </script>
</body>
</html>
