<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Integrales Avanzada</title>

  <!-- Librerías -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nerdamer/1.1.13/nerdamer.core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nerdamer/1.1.13/Calculus.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 16px;
      width: 800px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1, h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      box-sizing: border-box;
    }

    .section {
      margin-top: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    .hidden {
      display: none;
    }

    .symbol-box {
      margin-top: 12px;
      background: #020617;
      padding: 10px;
      border-radius: 10px;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
    }

    .symbol-btn {
      padding: 6px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    .symbol-btn:hover {
      background: #0ea5e9;
    }

    button.main {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: #22c55e;
      color: #020617;
      font-weight: bold;
    }

    canvas {
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .result {
      margin-top: 15px;
      padding: 12px;
      background: #020617;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
      min-height: 40px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Calculadora de Integrales Avanzada</h1>

    <!-- MODO (ARREGLADO: por defecto indefinida y sin solaparse) -->
    <div class="section">
      <label>Modo de cálculo:</label>
      <select id="modo" onchange="actualizarInterfaz()">
        <option value="indefinida" selected>Integral Indefinida</option>
        <option value="definida">Integral Definida</option>
        <option value="revolucion">Sólido de Revolución</option>
      </select>
    </div>

    <div class="section">
      <label>Función f(x):</label>
      <input type="text" id="func" placeholder="Ej: x^2, sin(x), sqrt(x)" />
    </div>

    <!-- Panel de símbolos -->
    <div class="symbol-box">
      <button class="symbol-btn" onclick="insertar('x')">x</button>
      <button class="symbol-btn" onclick="insertar('^')">^</button>
      <button class="symbol-btn" onclick="insertar('^2')">x²</button>
      <button class="symbol-btn" onclick="insertar('^3')">x³</button>
      <button class="symbol-btn" onclick="insertar('sqrt()')">√</button>
      <button class="symbol-btn" onclick="insertar('sin()')">sin</button>
      <button class="symbol-btn" onclick="insertar('cos()')">cos</button>
      <button class="symbol-btn" onclick="insertar('tan()')">tan</button>
      <button class="symbol-btn" onclick="insertar('log()')">log</button>
      <button class="symbol-btn" onclick="insertar('exp()')">exp</button>
      <button class="symbol-btn" onclick="insertar('pi')">π</button>
      <button class="symbol-btn" onclick="insertar('(')">(</button>
      <button class="symbol-btn" onclick="insertar(')')">)</button>
      <button class="symbol-btn" onclick="insertar('+')">+</button>
      <button class="symbol-btn" onclick="insertar('-')">−</button>
      <button class="symbol-btn" onclick="insertar('*')">×</button>
      <button class="symbol-btn" onclick="insertar('/')">÷</button>
    </div>

    <!-- LIMITES (ahora sí se ocultan correctamente) -->
    <div id="seccion-limites" class="section hidden">
      <div class="row">
        <div>
          <label>Límite inferior (a):</label>
          <input type="number" id="a" placeholder="Ej: 0" />
        </div>
        <div>
          <label>Límite superior (b):</label>
          <input type="number" id="b" placeholder="Ej: 5" />
        </div>
      </div>
    </div>

    <!-- REVOLUCION -->
    <div id="seccion-revolucion" class="section hidden">
      <label>Eje de revolución:</label>
      <select id="eje">
        <option value="x">Alrededor del eje X (Arandelas)</option>
        <option value="y">Alrededor del eje Y (Cascarones)</option>
      </select>
    </div>

    <!-- DECIMALES (solo definida y revolución) -->
    <div id="seccion-decimales" class="section hidden">
      <label>Decimales del resultado:</label>
      <input type="number" id="decimales" value="4" min="0" max="10" />
    </div>

    <button class="main" onclick="calcular()">Calcular y Graficar</button>

    <div class="result" id="resultado">Resultado: —</div>

    <h2>Gráfica</h2>
    <canvas id="grafica"></canvas>
  </div>

  <script>
    let chart;

    // NUEVO: controla qué se muestra según el modo
    function actualizarInterfaz() {
      const modo = document.getElementById("modo").value;
      const limites = document.getElementById("seccion-limites");
      const revolucion = document.getElementById("seccion-revolucion");
      const decimales = document.getElementById("seccion-decimales");

      if (modo === "indefinida") {
        limites.classList.add("hidden");
        revolucion.classList.add("hidden");
        decimales.classList.add("hidden");
      } else if (modo === "definida") {
        limites.classList.remove("hidden");
        revolucion.classList.add("hidden");
        decimales.classList.remove("hidden");
      } else if (modo === "revolucion") {
        limites.classList.remove("hidden");
        revolucion.classList.remove("hidden");
        decimales.classList.remove("hidden");
      }
    }

    function insertar(txt) {
      const input = document.getElementById("func");
      const start = input.selectionStart || input.value.length;
      const end = input.selectionEnd || input.value.length;
      input.value = input.value.substring(0, start) + txt + input.value.substring(end);
      input.focus();
      input.selectionStart = input.selectionEnd = start + txt.length;
    }

    function simpson(f, a, b, n = 1000) {
      if (n % 2 !== 0) n++;
      const h = (b - a) / n;
      let sum = f(a) + f(b);
      for (let i = 1; i < n; i++) {
        const x = a + i * h;
        sum += (i % 2 === 0 ? 2 : 4) * f(x);
      }
      return (h / 3) * sum;
    }

    function graficar(f, a, b) {
      const xs = [];
      const ys = [];
      const pasos = 120;
      const step = (b - a) / pasos;

      for (let i = 0; i <= pasos; i++) {
        const x = a + i * step;
        xs.push(x.toFixed(2));
        ys.push(f(x));
      }

      if (chart) chart.destroy();

      const ctx = document.getElementById("grafica");
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: xs,
          datasets: [{
            label: 'f(x)',
            data: ys,
            borderWidth: 2,
            fill: false
          }]
        },
        options: { responsive: true }
      });
    }

    function calcular() {
      const modo = document.getElementById("modo").value;
      const funcStr = document.getElementById("func").value;
      const resDiv = document.getElementById("resultado");

      if (!funcStr) {
        resDiv.textContent = "Ingresa una función válida";
        return;
      }

      try {
        // INDEFINIDA (por defecto)
        if (modo === "indefinida") {
          const integral = nerdamer.integrate(funcStr, 'x').toString();
          resDiv.textContent = `∫ f(x) dx = ${integral} + C`;
          return;
        }

        const a = parseFloat(document.getElementById("a").value);
        const b = parseFloat(document.getElementById("b").value);
        const dec = parseInt(document.getElementById("decimales").value) || 4;

        if (isNaN(a) || isNaN(b)) {
          resDiv.textContent = "Ingresa límites válidos (a y b)";
          return;
        }

        const expr = math.compile(funcStr);
        const f = (x) => expr.evaluate({ x });

        if (modo === "definida") {
          const resultado = simpson(f, a, b);
          resDiv.textContent = `Integral definida = ${resultado.toFixed(dec)}`;
          graficar(f, a, b);
        }

        if (modo === "revolucion") {
          const eje = document.getElementById("eje").value;
          let volumen;

          if (eje === "x") {
            const g = (x) => Math.PI * Math.pow(f(x), 2);
            volumen = simpson(g, a, b);
            resDiv.textContent = `Volumen (Arandelas, eje X) = ${volumen.toFixed(dec)}`;
          } else {
            const g = (x) => 2 * Math.PI * x * f(x);
            volumen = simpson(g, a, b);
            resDiv.textContent = `Volumen (Cascarones, eje Y) = ${volumen.toFixed(dec)}`;
          }
          graficar(f, a, b);
        }

      } catch (e) {
        resDiv.textContent = "Error en la función matemática";
      }
    }

    // IMPORTANTE: inicializa la interfaz correctamente (indefinida por defecto)
    actualizarInterfaz();
  </script>
</body>
</html>
