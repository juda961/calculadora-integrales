<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Integrales</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
  <!-- Librería para integrales indefinidas (simbólicas) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nerdamer/1.1.13/nerdamer.core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nerdamer/1.1.13/Calculus.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      width: 440px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #0ea5e9;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
      min-height: 40px;
      word-break: break-word;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Calculadora de Integrales</h1>

    <label>Tipo de integral:</label>
    <select id="tipo" onchange="cambiarTipo()">
      <option value="definida">Integral Definida</option>
      <option value="indefinida">Integral Indefinida</option>
    </select>

    <label>Función f(x):</label>
    <input type="text" id="func" placeholder="Ej: sin(x), x^2, exp(x)" />

    <div id="limites">
      <label>Límite inferior (a):</label>
      <input type="number" id="a" placeholder="Ej: 0" />

      <label>Límite superior (b):</label>
      <input type="number" id="b" placeholder="Ej: 5" />
    </div>

    <label>Decimales del resultado (solo definida):</label>
    <input type="number" id="decimales" value="4" min="0" max="10" />

    <button onclick="calcularIntegral()">Calcular Integral</button>

    <div class="result" id="resultado">Resultado: —</div>
    <div class="note">
      Definida: cálculo numérico | Indefinida: resultado simbólico + C
    </div>
  </div>

  <script>
    function cambiarTipo() {
      const tipo = document.getElementById("tipo").value;
      const limites = document.getElementById("limites");

      if (tipo === "definida") {
        limites.classList.remove("hidden");
      } else {
        limites.classList.add("hidden");
      }
    }

    function simpson(f, a, b, n = 1000) {
      if (n % 2 !== 0) n++;
      const h = (b - a) / n;
      let sum = f(a) + f(b);

      for (let i = 1; i < n; i++) {
        const x = a + i * h;
        sum += (i % 2 === 0 ? 2 : 4) * f(x);
      }

      return (h / 3) * sum;
    }

    function calcularIntegral() {
      const tipo = document.getElementById("tipo").value;
      const funcStr = document.getElementById("func").value;
      const resultadoDiv = document.getElementById("resultado");

      if (!funcStr) {
        resultadoDiv.textContent = "Resultado: Ingresa una función válida";
        return;
      }

      // INTEGRAL INDEFINIDA (simbólica)
      if (tipo === "indefinida") {
        try {
          const integral = nerdamer.integrate(funcStr, 'x').toString();
          resultadoDiv.textContent = `Resultado: ∫ f(x) dx = ${integral} + C`;
        } catch (error) {
          resultadoDiv.textContent = "Error: No se pudo calcular la integral indefinida";
        }
        return;
      }

      // INTEGRAL DEFINIDA (numérica)
      const aInput = document.getElementById("a").value;
      const bInput = document.getElementById("b").value;
      const decimalesInput = document.getElementById("decimales").value;
      const decimales = parseInt(decimalesInput) || 4;

      if (aInput === "" || bInput === "") {
        resultadoDiv.textContent = "Resultado: Ingresa los límites a y b para la integral definida";
        return;
      }

      const a = parseFloat(aInput);
      const b = parseFloat(bInput);

      if (isNaN(a) || isNaN(b)) {
        resultadoDiv.textContent = "Resultado: Límites no válidos";
        return;
      }

      try {
        const expr = math.compile(funcStr);
        const f = (x) => expr.evaluate({ x });
        const resultado = simpson(f, a, b);

        resultadoDiv.textContent = `Resultado: ∫[${a}, ${b}] = ${resultado.toFixed(decimales)}`;
      } catch (error) {
        resultadoDiv.textContent = "Error: Función no válida";
      }
    }
  </script>
</body>
</html>
